version: '3.8'

services:
  # 1. 資料庫服務 (保持原樣)
  db:
    image: postgres:15-alpine
    container_name: smart_finance_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: smart_finance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. 資料庫管理工具 (保持原樣)
  pgadmin:
    image: dpage/pgadmin4
    container_name: smart_finance_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

  # 🌟 3. 新增：前端 React (Nginx) 服務
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart_finance_frontend
    ports:
      - "3000:80" # 將你本機的 3000 port 對應到容器內 Nginx 的 80 port
    restart: unless-stopped
    depends_on:
      - db
  
  # 🌟 新增：FastAPI 後端服務
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_finance_backend
    env_file:
      - .env
    environment:
      # 告訴後端，資料庫的主機名稱現在叫做 "db"
      - DATABASE_URL=postgresql+psycopg://root:rootpassword@db:5432/smart_finance
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata: